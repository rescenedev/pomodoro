name: Pomodoro
options:
  bundleIdPrefix: com.playground
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "3"
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 589U6DQJN8
targets:
  Pomodoro:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Pomodoro
    dependencies:
      - target: PomodoroWidget
      - target: PomodoroWatch
    info:
      path: Pomodoro/Info.plist
      properties:
        CFBundleDisplayName: Pomodoro
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playground.pomodoro.ios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"

  PomodoroWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - PomodoroWidget
      - path: Pomodoro/Core/SessionType.swift
      - path: Pomodoro/Shared/PomodoroActivityAttributes.swift
    info:
      path: PomodoroWidget/Info.plist
      properties:
        CFBundleDisplayName: Pomodoro
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playground.pomodoro.ios.widget
        TARGETED_DEVICE_FAMILY: "1"

  PomodoroWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - PomodoroWatch
      - path: Pomodoro/Core/SessionType.swift
      - path: Pomodoro/Core/PomodoroSettings.swift
      - path: Pomodoro/Core/PomodoroTimer.swift
    info:
      path: PomodoroWatch/Info.plist
      properties:
        CFBundleDisplayName: Pomodoro
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.playground.pomodoro.ios
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playground.pomodoro.ios.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "4"
